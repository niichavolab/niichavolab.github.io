<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вселенная Такс — НИИ ЧАВО LAB.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <header class="soft-header">
        <h1>Вселенная Такс</h1>
        <p>Фотки, плакаты, истории и прочая таксячья магия.</p>
    </header>

    <main class="panel">
        <div class="gallery-status" id="galleryStatus">Загружаем такс из архива НИИ ЧАВО…</div>
        <div class="gallery" id="taksGallery"></div>
    </main>

    <div class="back-box">
        <a href="index.html"><img src="img/bkp.png" class="back-btn" alt="На главную"></a>
    </div>
</div>

<div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Закрыть">×</button>
    <button class="lightbox-arrow lightbox-prev" id="lightboxPrev" type="button" aria-label="Предыдущая картинка">&#10094;</button>

    <figure class="lightbox-content">
        <img id="lightboxImage" src="" alt="">
        <figcaption id="lightboxCaption"></figcaption>
    </figure>

    <button class="lightbox-arrow lightbox-next" id="lightboxNext" type="button" aria-label="Следующая картинка">&#10095;</button>
</div>

<script src="mirtaks/gallery-data.js"></script>
<script>
(() => {
    const gallery = document.getElementById('taksGallery');
    const status = document.getElementById('galleryStatus');
    const lightbox = document.getElementById('lightbox');
    const image = document.getElementById('lightboxImage');
    const caption = document.getElementById('lightboxCaption');
    const closeButton = document.getElementById('lightboxClose');
    const prevButton = document.getElementById('lightboxPrev');
    const nextButton = document.getElementById('lightboxNext');

    let items = [];
    let currentIndex = 0;
    let wheelLocked = false;
    let touchStartX = 0;

    function imagePath(file) {
        return `mirtaks/${String(file).split('/').map(encodeURIComponent).join('/')}`;
    }

    function buildGallery(data) {
        items = data.filter(item => item && item.file);
        gallery.textContent = '';

        if (!items.length) {
            status.textContent = 'В gallery.json пока нет картинок.';
            return;
        }

        const fragment = document.createDocumentFragment();

        items.forEach((item, index) => {
            const button = document.createElement('button');
            button.className = 'gallery-item';
            button.type = 'button';
            button.dataset.index = index;

            const thumb = document.createElement('img');
            thumb.className = 'thumb';
            thumb.src = imagePath(item.file);
            thumb.alt = item.title || `Экспонат №${index + 1}`;
            thumb.loading = 'lazy';
            thumb.decoding = 'async';

            button.appendChild(thumb);
            button.addEventListener('click', () => openLightbox(index));
            fragment.appendChild(button);
        });

        gallery.appendChild(fragment);
        status.textContent = `Экспонатов в архиве: ${items.length}`;
    }

    function show(index) {
        if (!items.length) return;
        currentIndex = (index + items.length) % items.length;
        const item = items[currentIndex];
        image.src = imagePath(item.file);
        image.alt = item.title || `Экспонат №${currentIndex + 1}`;
        caption.textContent = item.title || `Экспонат №${currentIndex + 1}`;

        const next = items[(currentIndex + 1) % items.length];
        const previous = items[(currentIndex - 1 + items.length) % items.length];
        [next, previous].forEach(entry => {
            const preload = new Image();
            preload.src = imagePath(entry.file);
        });
    }

    function openLightbox(index) {
        show(index);
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('no-scroll');
        closeButton.focus();
    }

    function closeLightbox() {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('no-scroll');
        const active = gallery.querySelector(`[data-index="${currentIndex}"]`);
        if (active) active.focus();
    }

    prevButton.addEventListener('click', () => show(currentIndex - 1));
    nextButton.addEventListener('click', () => show(currentIndex + 1));
    closeButton.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', event => {
        if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', event => {
        if (!lightbox.classList.contains('open')) return;
        if (event.key === 'Escape') closeLightbox();
        if (event.key === 'ArrowLeft') show(currentIndex - 1);
        if (event.key === 'ArrowRight') show(currentIndex + 1);
    });

    lightbox.addEventListener('wheel', event => {
        event.preventDefault();
        if (wheelLocked) return;
        wheelLocked = true;
        show(currentIndex + (event.deltaY > 0 ? 1 : -1));
        setTimeout(() => wheelLocked = false, 220);
    }, { passive: false });

    lightbox.addEventListener('touchstart', event => {
        touchStartX = event.changedTouches[0].screenX;
    }, { passive: true });

    lightbox.addEventListener('touchend', event => {
        const shift = event.changedTouches[0].screenX - touchStartX;
        if (Math.abs(shift) < 45) return;
        show(currentIndex + (shift < 0 ? 1 : -1));
    }, { passive: true });

    if (Array.isArray(window.NII_CHAVO_GALLERY)) {
        buildGallery(window.NII_CHAVO_GALLERY);
    } else {
        status.innerHTML = 'Не найден <b>mirtaks/gallery-data.js</b>.<br>Запусти файл <b>Обновить_галерею.bat</b> в папке mirtaks.';
    }
})();
</script>
</body>
</html>
